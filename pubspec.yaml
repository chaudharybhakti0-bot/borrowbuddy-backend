name: borrow_buddy
description: Campus peer-to-peer item rental platform
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  go_router: ^13.2.0
  http: ^1.2.1
  dio: ^5.4.3+1
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  intl: ^0.19.0
  image_picker: ^1.1.1
  path_provider: ^2.1.3
  table_calendar: ^3.1.1
  flutter_svg: ^2.0.10+1

  # ✅ Keep only ONE version
  google_sign_in: ^6.2.1

  # ✅ Proper version (not x.x)
  firebase_auth: ^4.16.0
  firebase_core: ^2.25.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/